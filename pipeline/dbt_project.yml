name: 'elnino_early_warning'
version: '1.0.0'
config-version: 2

profile: 'elnino'

# Model file paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  elnino_early_warning:
    # Staging: views by default (cheap, always fresh)
    staging:
      +materialized: view
      +schema: staging

    # Marts: tables (pre-computed for fast dashboard queries)
    # No +schema override — dbt's default generate_schema_name macro
    # CONCATENATES a configured schema onto the profile's target schema
    # (public + public = "public_public"), it doesn't replace it. Omitting
    # the override is what makes this land in plain `public`, where the
    # migrations created the tables and where the dashboard's anon RLS
    # policies and Supabase's PostgREST both expect it.
    marts:
      +materialized: table

seeds:
  elnino_early_warning:
    # No +schema override here either — same generate_schema_name gotcha;
    # omitting it keeps seeds in plain `public`, matching the tables the
    # migrations already created and the CSVs already imported into.
    provinces:
      +column_types:
        id: integer
        lat: float
        lon: float
        is_pilot: boolean
    crop_calendars:
      +column_types:
        id: integer
        province_id: integer
        planting_start: date
        planting_end: date
        harvest_start: date
        harvest_end: date
    pagasa_stations:
      +column_types:
        id: integer
        lat: float
        lon: float
    province_station_mapping:
      +column_types:
        province_id: integer
        station_id: integer
        weight: float

# Variables (can be overridden at run time)
vars:
  pilot_province_count: 15
  total_province_count: 82
  risk_high_threshold: 65
  risk_medium_threshold: 35
